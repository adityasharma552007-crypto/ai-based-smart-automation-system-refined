services:
  - type: web
    name: smart-city-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn data_server:app
    envVars:
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: WAQI_API_KEY
        sync: false
      - key: TOMTOM_API_KEY
        sync: false
